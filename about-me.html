<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appalachian Trail Updates - About Me</title>
    <style>
        body {
            font-family: monospace;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
            color: #333;
        }
        h1 { font-size: 1.5em; border-bottom: 2px solid #333; }
        h2 { font-size: 1.2em; border-bottom: 1px solid #ccc; margin-top: 2em; }
        h3 { font-size: 1.1em; margin-top: 1.5em; }
        .progress-bar {
            background: #ddd;
            border: 1px solid #999;
            padding: 15px;
            margin: 20px 0;
        }
        .progress-container {
            width: 100%;
            height: 30px;
            background: #ddd;
            border: 1px solid #999;
        }
        .progress-fill {
            height: 100%;
            background: #28a745;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: monospace;
            transition: width 0.3s ease;
        }
        .current-location {
            background: #e9ecef;
            border: 1px solid #ccc;
            padding: 15px;
            margin: 20px 0;
        }
        .blog-post {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 15px 0;
            background: white;
        }
        .post-date {
            color: #666;
            font-size: 0.9em;
        }
        .post-mile {
            color: #28a745;
            font-weight: bold;
        }
        a { color: #0066cc; }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ccc;
            font-size: 0.9em;
            color: #666;
        }
        .stats {
            background: #f8f9fa;
            border-left: 4px solid #28a745;
            padding: 10px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Paul's Appalachian Trail Journal</h1>
    </header>
    
    <div class="progress-bar">
        <div class="progress-container">
            <div class="progress-fill" style="width: 0%;">
                <span></span>
            </div>
        </div>
        <p style="margin-top: 10px;">PROGRESS: 0/2160 mi (0%)</p>
    </div>
    
    <div class="current-location">
        <h2>Current Location</h2>
        <p><strong>Not yet started</strong></p>
        <p>Date: <span id="current-date"></span></p>
    </div>
    
    <main>
        <h2>About Me</h2>
        
        <article class="blog-post">
            <h3>Who I Am</h3>

            <p>I am a 29 year old software engineer who likes to program and (hopefully!) likes to hike</p>
            <p><em><a href="index.html">← Back to index</a></em></p>
        </article>
    </main>
    
    <footer class="footer">
        <a href="index.html">← Back to Index</a> |
        <a href="about-me.html">About Me</a>
    </footer>
    
    <script>
        // Simple date display
        document.getElementById('current-date').textContent = new Date().toLocaleDateString();
    </script>
</body>
</html>
