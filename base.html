<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appalachian Trail Updates</title>
    <style>
        /* Minimal CSS for HTTP browsers */
        body {
            font-family: monospace;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
            color: #333;
        }
        h1 { font-size: 1.5em; border-bottom: 2px solid #333; }
        h2 { font-size: 1.2em; border-bottom: 1px solid #ccc; margin-top: 2em; }
        h3 { font-size: 1.1em; margin-top: 1.5em; }
        .progress-bar {
            background: #ddd;
            border: 1px solid #999;
            padding: 15px;
            margin: 20px 0;
        }
        .progress-fill {
            background: #28a745;
            color: white;
            padding: 10px;
            font-weight: bold;
        }
        .current-location {
            background: #e9ecef;
            border: 1px solid #ccc;
            padding: 15px;
            margin: 20px 0;
        }
        .blog-post {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 15px 0;
            background: white;
        }
        .post-date {
            color: #666;
            font-size: 0.9em;
        }
        .post-mile {
            color: #28a745;
            font-weight: bold;
        }
        a { color: #0066cc; }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ccc;
            font-size: 0.9em;
            color: #666;
        }
        .stats {
            background: #f8f9fa;
            border-left: 4px solid #28a745;
            padding: 10px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Appalachian Trail Updates</h1>
        <p class="post-author">[HIKER] Paul</p>
    </header>
    
    <div class="progress-bar">
        <div class="progress-fill">
            PROGRESS: ████████░░░░░░░░░░░░░░░░ 0/2160 mi (0%)
        </div>
    </div>
    
    <div class="current-location">
        <h2>Current Location</h2>
        <p>Not yet started</p>
        <p>Date: <span id="current-date"></span></p>
    </div>
    
    <main>
        <h2>Recent Updates</h2>
        <section id="blog-posts">
            <!-- Blog posts go here -->
        </section>
    </main>
    
    <footer class="footer">
        <a href="index.html">← Back to Index</a> |
        <a href="about-me.html">About Me</a>
    </footer>
    
    <script>
        // Simple date display
        document.getElementById('current-date').textContent = new Date().toLocaleDateString();
    </script>
</body>
</html>
