<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Session Log</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #ffffff;
            color: #1a1a1a;
        }
        .session-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .session-header h1 {
            margin: 0 0 10px 0;
            font-size: 1.8em;
            font-weight: 600;
        }
        .session-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 0.95em;
        }
        .session-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .session-info div {
            font-size: 0.85em;
        }
        .session-info strong {
            display: block;
            font-size: 0.75em;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }
        .log-container {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
        }
        .log-entry {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        .log-entry:last-child {
            border-bottom: none;
        }
        .log-entry.user {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
        }
        .log-entry.assistant {
            background: white;
        }
        .log-timestamp {
            font-size: 0.75em;
            color: #666;
            margin-bottom: 10px;
            font-family: monospace;
        }
        .log-role {
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 10px;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .log-role.user {
            background: #3b82f6;
            color: white;
        }
        .log-role.assistant {
            background: #6b7280;
            color: white;
        }
        .log-content {
            font-size: 0.95em;
        }
        .log-content p {
            margin: 8px 0;
        }
        .thinking-box {
            background: #fffbeb;
            border-left: 3px solid #f59e0b;
            padding: 12px 15px;
            margin: 15px 0;
            border-radius: 0 8px 8px 0;
            font-size: 0.9em;
        }
        .thinking-box strong {
            color: #b45309;
        }
        .tool-call {
            background: #f3f4f6;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 0.9em;
            overflow-x: auto;
        }
        .tool-call strong {
            color: #2563eb;
        }
        .tool-result {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            overflow-x: auto;
        }
        .tool-result code {
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .code-block {
            background: #1f2937;
            color: #e5e7eb;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            overflow-x: auto;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.85em;
            line-height: 1.5;
        }
        .code-block .comment {
            color: #6b7280;
        }
        .code-block .string {
            color: #34d399;
        }
        .code-block .command {
            color: #60a5fa;
        }
        .log-error {
            background: #fef2f2 !important;
            border-color: #fecaca !important;
        }
        .log-error .log-role {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <div class="session-header">
        <h1>🤖 AI Agent Session Log</h1>
        <p>Pinephone EMMC Setup - Debugging Session Transcript</p>
        <div class="session-info">
            <div>
                <strong>Session ID</strong>
                <span>076bf126-2cab-4e81-87b8-fabc3dfe8f04</span>
            </div>
            <div>
                <strong>Started</strong>
                <span>2026-03-24 17:34:15 UTC</span>
            </div>
            <div>
                <strong>Model</strong>
                <span>gpt-5.1-codex-mini</span>
            </div>
            <div>
                <strong>Working Dir</strong>
                <span>/home/paul/Documents/prompts/emmc</span>
            </div>
        </div>
    </div>
    <div class="log-container">
        <div id="log-content"></div>
    </div>
    <script>
        // Read the session log and format it
        fetch('session-log-data.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('log-content');
                data.forEach(entry => {
                    const div = document.createElement('div');
                    div.className = `log-entry ${entry.role}`;
                    
                    const time = new Date(entry.timestamp).toLocaleString();
                    div.innerHTML = `
                        <div class="log-timestamp">${time}</div>
                        <div class="log-role ${entry.role}">${entry.role === 'user' ? 'You' : 'Agent'}</div>
                        <div class="log-content">${entry.content}</div>
                    `;
                    container.appendChild(div);
                });
            });
    </script>
</body>
</html>
